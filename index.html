<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f8f2f7">
  <meta name="description" content="英语与语文学习冒险的共同入口">
  <title>我的学习星球</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--ink:#493f55;--muted:#8b7f92;--paper:#fffdfb;--line:rgba(108,82,119,.12);--shadow:0 18px 50px rgba(91,64,105,.14)}
    *{box-sizing:border-box}html{min-height:100%;background:#f8f2f7}body{margin:0;min-height:100%;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 8%,#ffe8ef 0,transparent 31%),radial-gradient(circle at 92% 20%,#e9e2ff 0,transparent 32%),linear-gradient(155deg,#fffaf7 0%,#f7eff7 48%,#eeeafb 100%);overflow-x:hidden}
    body:before,body:after{content:"";position:fixed;pointer-events:none;border-radius:50%;filter:blur(2px);opacity:.6;z-index:0}body:before{width:220px;height:220px;right:-90px;bottom:8%;background:radial-gradient(circle,#ffd8e7,transparent 68%)}body:after{width:180px;height:180px;left:-80px;top:38%;background:radial-gradient(circle,#ded4ff,transparent 68%)}
    button,a{font:inherit}.shell{position:relative;z-index:1;width:min(1040px,100%);margin:auto;padding:calc(env(safe-area-inset-top,0px) + 26px) clamp(18px,5vw,54px) calc(env(safe-area-inset-bottom,0px) + 34px)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:11px}.brandMark{width:44px;height:44px;display:grid;place-items:center;border-radius:15px;background:rgba(255,255,255,.72);box-shadow:0 8px 24px rgba(100,74,113,.13);font-size:24px;border:1px solid rgba(255,255,255,.9)}.brandText b{display:block;font-family:Georgia,"STKaiti",serif;font-size:18px;letter-spacing:.04em}.brandText small{display:block;font-size:10px;letter-spacing:.18em;color:var(--muted);margin-top:2px}.wallet{display:flex;gap:7px}.wallet span{background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(100,74,113,.1);border-radius:18px;padding:8px 11px;font-size:13px;font-weight:800;white-space:nowrap}
    .hero{text-align:center;padding:42px 8px 28px}.eyebrow{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.62);color:#8d6c91;font-size:11px;font-weight:800;letter-spacing:.12em}.hero h1{margin:13px 0 8px;font-family:Georgia,"STKaiti",serif;font-size:clamp(30px,7vw,48px);font-weight:700;letter-spacing:.04em;color:#493a55}.hero p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}.spark{display:inline-block;color:#c496bd;animation:glow 2.6s ease-in-out infinite alternate}
    .portals{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}.portal{position:relative;isolation:isolate;display:flex;min-height:330px;overflow:hidden;border-radius:30px;text-decoration:none;color:inherit;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.9);transition:transform .22s ease,box-shadow .22s ease}.portal:hover{transform:translateY(-5px);box-shadow:0 25px 65px rgba(91,64,105,.2)}.portal:active{transform:scale(.985)}.portal:focus-visible{outline:4px solid rgba(137,103,168,.3);outline-offset:4px}.portal:before{content:"";position:absolute;inset:0;z-index:-2}.portal:after{content:"";position:absolute;width:210px;height:210px;border-radius:50%;right:-55px;top:-65px;background:rgba(255,255,255,.34);z-index:-1}
    .english:before{background:linear-gradient(150deg,#f4eaff 0%,#e2d8ff 48%,#cdd9ff 100%)}.chinese:before{background:linear-gradient(150deg,#fff6e8 0%,#ffe0d6 48%,#f7c7cd 100%)}
    .portalContent{display:flex;flex-direction:column;width:100%;padding:28px}.subject{display:flex;align-items:center;justify-content:space-between}.subjectTag{font-size:11px;letter-spacing:.12em;font-weight:900;padding:6px 10px;background:rgba(255,255,255,.62);border-radius:20px}.today{font-size:11px;font-weight:800;color:#76637d}.portal h2{font-family:Georgia,"STKaiti",serif;font-size:30px;margin:20px 0 4px;letter-spacing:.03em}.portal p{font-size:13px;color:#6e6273;margin:0;line-height:1.65}.scene{flex:1;position:relative;min-height:132px;margin:5px 0}.moon{position:absolute;width:92px;height:92px;border-radius:50%;right:9%;top:13px;background:radial-gradient(circle at 35% 30%,#fff,#f0ddff 62%,#d4c2f1);box-shadow:0 0 35px rgba(255,255,255,.8)}.castle{position:absolute;left:8%;bottom:6px;font-size:77px;filter:drop-shadow(0 12px 10px rgba(80,55,110,.16));animation:float 4.6s ease-in-out infinite}.starField{position:absolute;inset:0;background-image:radial-gradient(circle,#fff 0 2px,transparent 2.5px),radial-gradient(circle,#bba7e4 0 1.5px,transparent 2px);background-size:61px 53px,47px 39px;background-position:10px 7px,31px 22px;opacity:.7}.journal{position:absolute;left:7%;bottom:2px;width:148px;height:106px;border-radius:10px 18px 18px 10px;background:#fffaf1;transform:rotate(-5deg);box-shadow:0 13px 25px rgba(130,77,75,.15);border-left:9px solid #d49d9f}.journal:before{content:"南京 · 桂林 · 苏州";position:absolute;left:18px;top:22px;width:102px;color:#af7778;font:700 12px/2 "STKaiti",serif;border-top:2px dotted #e6b9ad;border-bottom:2px dotted #e6b9ad}.journal:after{content:"✿";position:absolute;right:-24px;top:-20px;font-size:46px;color:#e9a6aa;transform:rotate(13deg)}.badger{position:absolute;right:8%;bottom:0;font-size:73px;filter:drop-shadow(0 11px 9px rgba(110,70,60,.14));animation:float 4.8s .3s ease-in-out infinite}
    .go{display:flex;align-items:center;justify-content:space-between;padding-top:17px;border-top:1px solid rgba(95,70,100,.12);font-size:14px;font-weight:900}.arrow{width:37px;height:37px;display:grid;place-items:center;border-radius:50%;background:rgba(255,255,255,.7);font-size:18px;transition:transform .2s}.portal:hover .arrow{transform:translateX(3px)}.progress{height:5px;margin-top:8px;border-radius:5px;background:rgba(255,255,255,.46);overflow:hidden}.progress i{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#a486cd,#e0a6c0);transition:width .5s ease}.chinese .progress i{background:linear-gradient(90deg,#d69a6f,#d98e9d)}
    .note{text-align:center;color:#9b8fa0;font-size:11px;line-height:1.7;margin:22px 0 0}.note b{color:#76677d}.refresh{display:none;border:0;background:transparent;color:#8d7893;text-decoration:underline;padding:8px;margin:auto}
    @keyframes float{50%{transform:translateY(-7px)}}@keyframes glow{to{transform:rotate(12deg) scale(1.15);opacity:.7}}
    @media(max-width:720px){.shell{padding-left:16px;padding-right:16px}.top{align-items:flex-start}.brandText small{display:none}.wallet{flex-direction:column;gap:5px}.wallet span{padding:6px 9px;font-size:11px}.hero{padding:30px 5px 22px}.portals{grid-template-columns:1fr;gap:16px}.portal{min-height:282px;border-radius:25px}.portalContent{padding:22px}.portal h2{margin-top:15px;font-size:27px}.scene{min-height:105px}.castle{font-size:63px}.moon{width:76px;height:76px}.journal{width:130px;height:91px}.badger{font-size:62px}.journal:before{font-size:10px;width:87px}.go{padding-top:13px}}
    @media(max-width:360px){.brandText b{font-size:15px}.brandMark{width:39px;height:39px}.hero h1{font-size:28px}.portalContent{padding:19px}.subjectTag,.today{font-size:10px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="brand"><div class="brandMark">✦</div><div class="brandText"><b>我的学习星球</b><small>MY LEARNING PLANET</small></div></div>
      <div class="wallet" aria-label="共享奖励"><span>🪙 <b id="coins">0</b></span><span>🎟️ <b id="tickets">0</b></span></div>
    </header>

    <section class="hero">
      <div class="eyebrow"><span class="spark">✦</span> 今天想去哪里冒险？</div>
      <h1 id="greeting">欢迎回来，选个喜欢的冒险吧</h1>
      <p>不用赶进度，也不用和谁比赛。好奇一点、开心一点，就很好。</p>
    </section>

    <section class="portals" aria-label="选择学习项目">
      <a class="portal english" id="englishPortal" href="https://nevergiveup0618.github.io/English/">
        <div class="portalContent">
          <div class="subject"><span class="subjectTag">MAGIC ENGLISH</span><span class="today" id="englishToday">等你来玩 ✦</span></div>
          <h2>魔法英语乐园</h2><p>听句子、闯关卡，和伙伴一起收集魔法。</p>
          <div class="scene"><div class="starField"></div><div class="moon"></div><div class="castle" aria-hidden="true">🏰</div></div>
          <div class="go"><span id="englishAction">进入魔法学院</span><span class="arrow">→</span></div><div class="progress"><i id="englishProgress"></i></div>
        </div>
      </a>

      <a class="portal chinese" id="chinesePortal" href="https://nevergiveup0618.github.io/Chinese/?v=20">
        <div class="portalContent">
          <div class="subject"><span class="subjectTag">WRITING ADVENTURE</span><span class="today" id="chineseToday">等你来寻宝 ✦</span></div>
          <h2>寻宝作文记</h2><p>走遍城市、收集线索，把发现写进探险护照。</p>
          <div class="scene"><div class="journal" aria-hidden="true"></div><div class="badger" aria-hidden="true">🦡</div></div>
          <div class="go"><span id="chineseAction">翻开探险手账</span><span class="arrow">→</span></div><div class="progress"><i id="chineseProgress"></i></div>
        </div>
      </a>
    </section>

    <p class="note"><b>一只共享钱包，两段不同冒险。</b><br>英语和语文的金币、转盘券会在这里一起显示。</p>
    <button class="refresh" id="refreshBtn">刷新今日进度</button>
  </main>
  <script src="app.js"></script>
</body>
</html>
